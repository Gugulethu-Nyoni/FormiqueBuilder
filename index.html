<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formique Builder - Test</title>
    <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">-->

</head>
<body>
    <div style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">
        <h1 style="color: #313d4b; margin-bottom: 20px;">Formique Builder Test</h1>
        
        <!-- Builder mounts here -->
        <div id="formique-builder"></div>
    </div>

    <script src="formique-builder.js"></script>
    <script>
        // Initialize the builder
        //const builder = new FormiqueBuilder();

        const builder = new FormiqueBuilder('formique-builder', { showFormSettings: false });

        
        // Optional: Log output to console when it changes
        setInterval(() => {
            console.log('Current form output:', builder.getOutput());
        }, 5000);
    </script>
</body>
</html>
